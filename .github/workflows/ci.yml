name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # =============================================
  # Backend CI
  # =============================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ragqa_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      chroma:
        image: chromadb/chroma:latest
        ports:
          - 8000:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set environment variables
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENAI_BASE_URL=https://api.minimax.chat/v1" >> $GITHUB_ENV
          echo "OPENAI_MODEL=MiniMax-M2.5" >> $GITHUB_ENV

      - name: Build backend
        run: cd rag-qa-backend && mvn clean package -DskipTests

      - name: Run tests
        run: cd rag-qa-backend && mvn test

      - name: Run JaCoCo
        run: cd rag-qa-backend && mvn jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: rag-qa-backend/target/site/jacoco/

  # =============================================
  # Frontend CI
  # =============================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: rag-qa-frontend/package-lock.json

      - name: Install dependencies
        run: cd rag-qa-frontend && npm ci

      - name: Lint
        run: cd rag-qa-frontend && npm run lint

      - name: Build
        run: cd rag-qa-frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: rag-qa-frontend/dist

  # =============================================
  # Docker Build & Push (on main push)
  # =============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ragqa
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./rag-qa-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./rag-qa-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================
  # Notification (on failure)
  # =============================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci ]
    if: failure() && github.event_name == 'pull_request'
    steps:
      - name: Notify failure
        run: |
          echo "CI failed on PR #${{ github.event.pull_request.number }}"
          echo "Check the workflow logs: ${{ github.event.pull_request.html_url }}/checks"
