# 数据库配置 (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ragqa}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway 数据库迁移配置
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Spring AI MiniMax配置
spring.ai.minimax.api-key=${OPENAI_API_KEY}
spring.ai.minimax.base-url=https://api.minimax.chat
spring.ai.minimax.chat.options.model=${OPENAI_MODEL:MiniMax-M2.5}

# Spring AI Ollama配置 - 用于ChromaVectorStore的embedding生成
spring.ai.ollama.embedding.options.model=qwen3-embedding:4b
spring.ai.ollama.base-url=http://localhost:11434

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 文件存储目录
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# Chroma向量数据库配置 - 禁用自动配置，使用自定义配置
spring.ai.vectorstore.chroma.enabled=false
spring.ai.vectorstore.chroma.url=${CHROMA_URL:http://localhost:8000}
spring.ai.vectorstore.chroma.collection-name=${CHROMA_COLLECTION:rag-qa-collection}
spring.ai.vectorstore.chroma.collection-id=${CHROMA_COLLECTION_ID:f1218ee8-1d3a-4e10-bc99-1db28817f896}
spring.ai.vectorstore.chroma.tenant-name=${CHROMA_TENANT:SpringAiTenant}
spring.ai.vectorstore.chroma.database-name=${CHROMA_DATABASE:SpringAiDatabase}

# 文本分块策略配置
# 可选值: fixed(固定大小) | paragraph(按段落) | recursive(递归分块，推荐)
chunk.strategy=${CHUNK_STRATEGY:recursive}
chunk.size=${CHUNK_SIZE:500}
chunk.overlap=${CHUNK_OVERLAP:50}

# OCR 配置（用于扫描版 PDF）
# 启用 OCR 自动识别文字
ocr.enabled=${OCR_ENABLED:true}
# OCR 语言包：chi_sim=简体中文，eng=英文，多个用+连接
ocr.language=${OCR_LANGUAGE:chi_sim+eng}
# 页面分割模式：3=自动分页
ocr.psm=${OCR_PSM:3}

# 混合检索配置（向量 + BM25 融合）
# 启用混合检索提升召回准确率
hybrid.retrieval.enabled=${HYBRID_ENABLED:true}
# 向量检索权重
hybrid.retrieval.vector_weight=0.7
# BM25 权重
hybrid.retrieval.bm25_weight=0.3
# 最终返回结果数
hybrid.retrieval.topk=${RETRIEVAL_TOPK:3}

# Cross-Encoder 重排序配置
# 对初步检索结果进行精细排序，提高答案质量
rerank.enabled=${RERANK_ENABLED:false}
# 重排序模型（可配置 Ollama 本地部署或云服务）
rerank.model=${RERANK_MODEL:bge-reranker-base}
# 重排后返回的结果数
rerank.topk=${RERANK_TOPK:5}

# 表格抽取配置
table.extraction.enabled=${TABLE_EXTRACTION_ENABLED:true}

# 流式输出配置
# 可选值: true(流式) | false(非流式)
chat.streaming=${CHAT_STREAMING:true}

# 检索配置
retrieval.topk=${RETRIEVAL_TOPK:3}

# JWT配置
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnough123456
jwt.expiration=86400000

# 允许循环依赖
spring.main.allow-circular-references=true

# 日志配置
logging.level.com.ragqa=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# SpringDoc OpenAPI 配置
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.enable-nativeReflectFactory=true
springdoc.show-actuator=false
