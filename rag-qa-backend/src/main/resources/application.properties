# 数据库配置 (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ragqa}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Spring AI MiniMax配置
spring.ai.minimax.api-key=${OPENAI_API_KEY}
spring.ai.minimax.base-url=https://api.minimax.chat
spring.ai.minimax.chat.options.model=${OPENAI_MODEL:MiniMax-M2.5}

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 文件存储目录
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# Chroma向量数据库配置
chroma.host=${CHROMA_HOST:localhost}
chroma.port=${CHROMA_PORT:8000}
chroma.collection=${CHROMA_COLLECTION:rag-qa-collection}

# 文本分块策略配置
# 可选值: fixed(固定大小) | paragraph(按段落)
chunk.strategy=${CHUNK_STRATEGY:fixed}
chunk.size=${CHUNK_SIZE:500}
chunk.overlap=${CHUNK_OVERLAP:50}

# 流式输出配置
# 可选值: true(流式) | false(非流式)
chat.streaming=${CHAT_STREAMING:true}

# JWT配置
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnough123456
jwt.expiration=86400000

# 允许循环依赖
spring.main.allow-circular-references=true

# 日志配置
logging.level.com.ragqa=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
